<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polls — Admin</title>
  <link rel="stylesheet" href="/.static/css/admin.css">
  <style>
    .poll-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .poll-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .poll-question {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .poll-bar-wrap {
      margin-bottom: 5px;
    }
    .poll-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      margin-bottom: 2px;
    }
    .poll-bar-track {
      height: 8px;
      background: var(--faint);
      border-radius: 4px;
      overflow: hidden;
    }
    .poll-bar-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 4px;
      transition: width 0.3s;
    }
    .poll-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .poll-total {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .closed-badge {
      display: inline-block;
      font-size: 0.68rem;
      padding: 1px 6px;
      background: rgba(239,68,68,0.12);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 3px;
      margin-left: 6px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .export-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      align-items: center;
    }
    .export-bar span {
      font-size: 0.83rem;
      color: var(--muted);
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div id="admin-nav"></div>

  <div class="admin-wrap">
    <div class="section-header">
      <h2 style="margin:0">Polls</h2>
      <button class="btn" onclick="openCreate()">+ Attach Poll to Thread</button>
    </div>

    <div class="export-bar">
      <span>Export all poll data:</span>
      <a href="/admin/api/polls/export.json" class="btn btn-ghost" download>↓ JSON</a>
      <a href="/admin/api/polls/export.csv"  class="btn btn-ghost" download>↓ CSV</a>
    </div>

    <div id="polls-list">
      <p style="color:var(--muted);font-size:.85rem">Loading…</p>
    </div>
  </div>

  <!-- Create Poll Modal -->
  <div id="modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;">
    <div style="background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:24px;width:500px;max-height:90vh;overflow-y:auto;">
      <h3 id="modal-title" style="margin:0 0 16px">Attach Poll to Thread</h3>

      <form id="poll-form" onsubmit="submitPoll(event)">
        <input type="hidden" id="p-edit-board">
        <input type="hidden" id="p-edit-thread">

        <div id="target-fields">
          <div class="field-row">
            <label>Board URI</label>
            <input id="p-board" placeholder="ca-ab" required>
          </div>
          <div class="field-row">
            <label>Thread ID</label>
            <input id="p-thread" type="number" placeholder="12345" required>
          </div>
        </div>

        <div class="field-row">
          <label>Question</label>
          <input id="p-question" placeholder="Who will win the next election?" required>
        </div>

        <div class="field-row">
          <label>Options <span class="dim">(2–6, one per line)</span></label>
          <textarea id="p-options" rows="5" placeholder="Liberal&#10;Conservative&#10;NDP&#10;Green" style="width:100%;font-family:inherit;font-size:.83rem;background:#111;color:#eee;border:1px solid #333;border-radius:4px;padding:6px;resize:vertical;box-sizing:border-box" required></textarea>
        </div>

        <div class="field-row">
          <label>Closes at <span class="dim">(optional)</span></label>
          <input id="p-closes" type="datetime-local">
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn" id="p-submit">Attach Poll</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/.static/js/admin-common.js"></script>
  <script>
    adminNav('/admin/polls');

    let polls = [];

    async function load() {
      const data = await api('GET', '/admin/api/polls').catch(err => { toast(err.message, true); return null; });
      if (!data) return;
      polls = data.polls;
      render();
    }

    function isClosed(poll) {
      return poll.closesAt && new Date(poll.closesAt) < new Date();
    }

    function render() {
      const el = document.getElementById('polls-list');
      if (!polls.length) {
        el.innerHTML = '<p style="color:var(--muted);font-size:.85rem">No polls yet. Use "Attach Poll to Thread" to create one.</p>';
        return;
      }
      el.innerHTML = polls.map(t => {
        const poll    = t.poll;
        const total   = poll.options.reduce((s, o) => s + o.votes, 0);
        const closed  = isClosed(poll);
        const subject = t.subject ? esc(t.subject) : `Thread #${t.threadId}`;
        const closedBadge = closed ? '<span class="closed-badge">Closed</span>' : '';

        const bars = poll.options.map(o => {
          const pct = total > 0 ? ((o.votes / total) * 100).toFixed(1) : 0;
          return `
            <div class="poll-bar-wrap">
              <div class="poll-bar-label">
                <span>${esc(o.text)}</span>
                <span>${o.votes} vote${o.votes !== 1 ? 's' : ''} (${pct}%)</span>
              </div>
              <div class="poll-bar-track">
                <div class="poll-bar-fill" style="width:${pct}%"></div>
              </div>
            </div>
          `;
        }).join('');

        const closeStr = poll.closesAt
          ? `${closed ? 'Closed' : 'Closes'} ${formatDate(poll.closesAt)}`
          : 'No close date';

        return `
          <div class="poll-card">
            <div class="poll-meta">
              <a href="/${t.boardUri}/${t.threadId}" target="_blank" style="color:var(--blue)">/${t.boardUri}/ #${t.threadId}</a>
              — ${subject} &nbsp;·&nbsp; ${closeStr}${closedBadge}
            </div>
            <div class="poll-question">${esc(poll.question)}</div>
            ${bars}
            <div class="poll-total">${total} total vote${total !== 1 ? 's' : ''}</div>
            <div class="poll-actions">
              <button class="btn btn-sm" onclick='openEdit(${JSON.stringify(t)})'>Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deletePoll('${t.boardUri}', ${t.threadId})">Remove Poll</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function openCreate() {
      document.getElementById('modal-title').textContent = 'Attach Poll to Thread';
      document.getElementById('p-submit').textContent = 'Attach Poll';
      document.getElementById('p-edit-board').value  = '';
      document.getElementById('p-edit-thread').value = '';
      document.getElementById('target-fields').style.display = '';
      document.getElementById('p-board').value   = '';
      document.getElementById('p-thread').value  = '';
      document.getElementById('p-question').value = '';
      document.getElementById('p-options').value  = '';
      document.getElementById('p-closes').value   = '';
      showModal();
    }

    function openEdit(t) {
      document.getElementById('modal-title').textContent = 'Edit Poll';
      document.getElementById('p-submit').textContent = 'Save Changes';
      // Hide thread target fields — editing existing
      document.getElementById('target-fields').style.display = 'none';
      document.getElementById('p-edit-board').value  = t.boardUri;
      document.getElementById('p-edit-thread').value = t.threadId;
      document.getElementById('p-question').value = t.poll.question;
      document.getElementById('p-options').value  = t.poll.options.map(o => o.text).join('\n');
      if (t.poll.closesAt) {
        // datetime-local needs "YYYY-MM-DDTHH:MM"
        const d = new Date(t.poll.closesAt);
        const pad = n => String(n).padStart(2, '0');
        document.getElementById('p-closes').value =
          `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      } else {
        document.getElementById('p-closes').value = '';
      }
      showModal();
    }

    async function submitPoll(e) {
      e.preventDefault();

      const editBoard  = document.getElementById('p-edit-board').value;
      const editThread = document.getElementById('p-edit-thread').value;
      const isEdit = !!editBoard;

      const boardUri = isEdit ? editBoard  : document.getElementById('p-board').value.trim();
      const threadId = isEdit ? editThread : document.getElementById('p-thread').value.trim();

      const question = document.getElementById('p-question').value.trim();
      const options  = document.getElementById('p-options').value
        .split('\n').map(s => s.trim()).filter(Boolean);
      const closesAt = document.getElementById('p-closes').value || null;

      if (options.length < 2 || options.length > 6) {
        toast('Need 2–6 options', true);
        return;
      }

      try {
        await api('POST', `/admin/api/polls/${boardUri}/${threadId}`, { question, options, closesAt });
        toast(isEdit ? 'Poll updated' : 'Poll attached');
        closeModal();
        load();
      } catch (err) {
        toast(err.message, true);
      }
    }

    async function deletePoll(boardUri, threadId) {
      if (!confirm(`Remove poll from /${boardUri}/ thread #${threadId}?\nVote data will be lost.`)) return;
      try {
        await api('DELETE', `/admin/api/polls/${boardUri}/${threadId}`);
        toast('Poll removed');
        load();
      } catch (err) {
        toast(err.message, true);
      }
    }

    function showModal() {
      document.getElementById('modal-backdrop').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal-backdrop').style.display = 'none';
    }

    document.getElementById('modal-backdrop').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });

    load();
  </script>
</body>
</html>
